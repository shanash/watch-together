<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watch Together - Room</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="room-container">
    <!-- Header -->
    <div class="room-header">
      <h1>Watch Together</h1>
      <button id="sidebar-toggle" class="sidebar-toggle" aria-label="메뉴 열기">&#9776;</button>
      <div class="room-info">
        <span>방 코드: <strong id="room-id">---</strong></span>
        <button id="copy-code" title="코드 복사">복사</button>
      </div>
    </div>

    <!-- Main content -->
    <div class="room-body">
      <!-- Video area -->
      <div class="video-area">
        <video id="video-player" playsinline>
          브라우저가 video 태그를 지원하지 않습니다.
        </video>
        <div id="yt-player-wrap" hidden>
          <div id="yt-player"></div>
        </div>
        <div id="sync-notice" class="sync-notice" hidden>동기화 중...</div>
      </div>

      <!-- Sidebar -->
      <div class="sidebar">
        <!-- Participants -->
        <div class="sidebar-section">
          <h3>참가자 <span id="user-count">0</span>명</h3>
          <ul id="user-list"></ul>
        </div>

        <!-- Playlist -->
        <div class="sidebar-section playlist-section">
          <div class="playlist-header">
            <h3>재생목록</h3>
            <button id="playlist-add-btn" class="playlist-add-btn" title="추가">+</button>
          </div>
          <ul id="playlist"></ul>
          <button id="sub-toggle" class="sub-toggle" hidden>자막 끄기</button>
        </div>

        <!-- Chat -->
        <div class="sidebar-section chat-section">
          <h3>채팅</h3>
          <div id="chat-messages" class="chat-messages"></div>
          <div class="chat-input-wrap">
            <input type="text" id="chat-input" placeholder="메시지 입력..." maxlength="200" autocomplete="off">
            <button id="chat-send">전송</button>
          </div>
        </div>

        <div id="status-area">
          <p id="status-msg">연결 중...</p>
        </div>
      </div>
      <div id="sidebar-backdrop" class="sidebar-backdrop"></div>
    </div>
  </div>

  <!-- Playlist Add Modal -->
  <div id="playlist-modal" class="modal-overlay" hidden>
    <div class="modal">
      <div class="modal-header">
        <h3>재생목록에 추가</h3>
        <button id="modal-close" class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <!-- Tabs -->
        <div class="tabs">
          <button type="button" class="tab active" data-modal-tab="modal-url">URL 입력</button>
          <button type="button" class="tab" data-modal-tab="modal-file">파일 업로드</button>
        </div>

        <!-- URL tab -->
        <div id="modal-url" class="modal-tab-content active">
          <input type="text" id="modal-url-input" placeholder="YouTube 또는 영상 URL">
          <button id="modal-url-add">추가</button>
        </div>

        <!-- File tab -->
        <div id="modal-file" class="modal-tab-content">
          <label class="file-label" id="modal-video-label">
            <span>영상 파일 선택 (.mp4, .webm)</span>
            <input type="file" id="modal-video-file" accept=".mp4,.webm" hidden>
          </label>
          <label class="file-label" id="modal-sub-label">
            <span>자막 파일 선택 (.smi, .srt, .vtt) - 선택사항</span>
            <input type="file" id="modal-sub-file" accept=".smi,.srt,.vtt" hidden>
          </label>
          <div id="modal-upload-progress" class="progress-wrap" hidden>
            <div id="modal-progress-bar" class="progress-bar"></div>
            <span id="modal-progress-text" class="progress-text">0%</span>
          </div>
          <button id="modal-file-add">업로드 및 추가</button>
        </div>

        <div id="modal-status" class="upload-status" hidden></div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/subtitle-parser.js"></script>
  <script src="/js/room.js"></script>
</body>
</html>
